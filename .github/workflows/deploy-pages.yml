name: Deploy to GitHub Pages

# Deploys the static site (index.html at repo root) to GitHub Pages.
on:
  # Run on every push to the default branch
  push:
    branches: [master]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required by the official Pages deployment actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Attempt to auto-enable Pages (source = GitHub Actions) on first run
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root (contains index.html)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
